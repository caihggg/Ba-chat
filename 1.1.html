  // ============ 功能 2：暗色模式 ============
  function applyTheme(theme) {
    if (theme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    } else {
      document.documentElement.removeAttribute("data-theme");
    }
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    localStorage.setItem("ba_theme", next);
    toast(next === "dark" ? "已切换到暗色模式" : "已切换到亮色模式", "info");
  }
  function initTheme() {
    const saved = localStorage.getItem("ba_theme");
    if (saved === "dark" || saved === "light") {
      applyTheme(saved);
    } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
      applyTheme("dark");
    }
  }

  // ============ 功能 5：API 连接状态指示 ============
  function updateApiStatus(state, latency, msg) {
    apiStatus = { state, latency: latency || 0, ts: Date.now(), msg: msg || "" };
    const el = document.getElementById("apiStatus");
    const txt = document.getElementById("apiStatusText");
    if (!el || !txt) return;
    el.className = "api-status " + state;
    const labels = {
      untested: "未测试",
      testing: "测试中",
      ok: latency ? `正常 · ${latency}ms` : "正常",
      slow: latency ? `较慢 · ${latency}ms` : "较慢",
      error: "异常",
    };
    txt.textContent = labels[state] || "未测试";
    if (msg) el.title = msg;
  }
  function initApiStatus() {
    const cfg = getConfig();
    if (!cfg.apiKey || !cfg.baseUrl || !cfg.model) {
      updateApiStatus("error", 0, "未配置 API");
    } else {
      updateApiStatus("untested", 0);
    }
  }

  // ============ 功能 7：消息编辑 ============
  function editMessage(idx) {
    if (!currentCharId) return;
    if (isGenerating) { toast("请先停止生成", "error"); return; }
    const m = currentChatMessages[idx];
    if (!m || m.role !== "user") return;
    const msgEl = document.querySelector(`.msg[data-index="${idx}"]`);
    if (!msgEl) return;
    const wrap = msgEl.querySelector(".msg-content-wrap");
    if (!wrap || wrap.querySelector(".edit-area")) return;
    // 保存原始内容以便取消恢复
    wrap.dataset.originalHtml = wrap.innerHTML;
    const editArea = document.createElement("div");
    editArea.className = "edit-area";
    editArea.innerHTML = `
      <textarea class="edit-textarea" rows="3">${escapeHtml(m.content)}</textarea>
      <div class="edit-actions">
        <button class="edit-btn save" onclick="saveMessageEdit(${idx})">保存</button>
        <button class="edit-btn" onclick="cancelMessageEdit(${idx})">取消</button>
      </div>
    `;
    wrap.innerHTML = "";
    wrap.appendChild(editArea);
    const ta = wrap.querySelector(".edit-textarea");
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    autoResize(ta);
    ta.addEventListener("input", () => autoResize(ta));
  }
  function saveMessageEdit(idx) {
    const m = currentChatMessages[idx];
    if (!m) return;
    const msgEl = document.querySelector(`.msg[data-index="${idx}"]`);
    const ta = msgEl?.querySelector(".edit-textarea");
    if (!ta) return;
    const newText = ta.value.trim();
    if (!newText) { toast("消息内容不能为空", "error"); return; }
    // 更新消息内容
    m.content = newText;
    m.ts = m.ts || Date.now();
    // 删除该消息之后的所有消息（包括对应 AI 回复）
    const removedCount = currentChatMessages.length - idx - 1;
    currentChatMessages.splice(idx + 1, removedCount);
    // 同步到 localStorage
    persistCurrentChatIfSaved();
    // 重新渲染
    renderChatMessages();
    toast(removedCount > 0 ? `已编辑，后续 ${removedCount} 条消息已删除` : "已编辑", "success");
  }
  function cancelMessageEdit(idx) {
    const msgEl = document.querySelector(`.msg[data-index="${idx}"]`);
    if (!msgEl) return;
    const wrap = msgEl.querySelector(".msg-content-wrap");
    if (!wrap || !wrap.dataset.originalHtml) {
      renderChatMessages();
      return;
    }
    // 恢复原始内容
    wrap.innerHTML = wrap.dataset.originalHtml;
    delete wrap.dataset.originalHtml;
  }

  // ============ 功能 1：导出/导入对话 ============
  function exportAllChats() {
    const idx = getChatFilesIndex();
    if (idx.length === 0) { toast("没有可导出的对话", "error"); return; }
    // 收集所有对话数据
    const data = idx.map(f => {
      const messages = getChatFileData(f.id);
      return { meta: f, messages: messages };
    });
    const exportObj = {
      version: 1,
      exportedAt: new Date().toISOString(),
      chats: data,
    };
    const d = new Date();
    const fname = `ba-chats-export-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.json`;
    const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`已导出 ${idx.length} 份对话到 ${fname}`, "success");
  }

  function importChatsFromFile(input) {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const obj = JSON.parse(e.target.result);
        const count = handleImportData(obj);
        if (count > 0) {
          toast(`已导入 ${count} 份对话`, "success");
          renderChatFiles();
          renderCards();
        }
      } catch (err) {
        toast("导入失败：JSON 格式错误", "error");
      }
      input.value = ""; // 清空以便重复选择同一文件
    };
    reader.onerror = () => { toast("读取文件失败", "error"); input.value = ""; };
    reader.readAsText(file);
  }

  // 处理导入数据：支持 { chats: [{meta, messages}] } 或 [messages] 或 {messages:[...]}
  function handleImportData(obj) {
    let chats = [];
    if (Array.isArray(obj)) {
      // 旧格式：直接是消息数组
      chats = [{ meta: { name: "导入的对话", charId: currentCharId || 1, charName: "导入" }, messages: obj }];
    } else if (obj.chats && Array.isArray(obj.chats)) {
      chats = obj.chats;
    } else if (obj.messages && Array.isArray(obj.messages)) {
      chats = [{ meta: obj.meta || { name: obj.name || "导入的对话" }, messages: obj.messages }];
    } else {
      return 0;
    }
    let count = 0;
    for (const c of chats) {
      const meta = c.meta || {};
      const messages = c.messages || [];
      if (!messages.length) continue;
      const charId = meta.charId || currentCharId || 1;
      const char = CHARACTERS.find(x => x.id === charId);
      const charName = char ? char.zh : (meta.charName || "导入角色");
      // 同名时追加 (导入) 后缀
      let baseName = meta.name || "导入的对话";
      const existNames = new Set(getChatFilesByChar(charId).map(f => f.name));
      let uniqueName = baseName;
      if (existNames.has(uniqueName)) {
        uniqueName = `${baseName}(导入)`;
        let i = 1;
        while (existNames.has(`${baseName}(导入)${i > 1 ? `(${i})` : ""}`)) i++;
        uniqueName = i > 1 ? `${baseName}(导入)(${i})` : `${baseName}(导入)`;
      }
      const id = genUniqueId();
      saveChatFileData(id, messages);
      upsertChatFile(id, charId, charName, uniqueName, messages);
      count++;
    }
    return count;
  }

  // 拖拽 JSON 文件到对话记录面板导入
  function setupDragDrop() {
    const modal = document.querySelector("#chatFilesModal .modal");
    if (!modal) return;
    ["dragenter", "dragover"].forEach(ev => {
      modal.addEventListener(ev, (e) => {
        e.preventDefault();
        e.stopPropagation();
        modal.classList.add("drag-over");
      });
    });
    ["dragleave", "dragend"].forEach(ev => {
      modal.addEventListener(ev, (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.target === modal || !modal.contains(e.relatedTarget)) {
          modal.classList.remove("drag-over");
        }
      });
    });
    modal.addEventListener("drop", (e) => {
      e.preventDefault();
      e.stopPropagation();
      modal.classList.remove("drag-over");
      const files = e.dataTransfer && e.dataTransfer.files;
      if (!files || files.length === 0) return;
      let importedCount = 0;
      let pending = files.length;
      for (const file of files) {
        if (!file.name.endsWith(".json") && file.type !== "application/json") {
          pending--;
          continue;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const obj = JSON.parse(ev.target.result);
            importedCount += handleImportData(obj);
          } catch (err) { /* 忽略单个文件错误 */ }
          pending--;
          if (pending <= 0) {
            if (importedCount > 0) {
              toast(`已导入 ${importedCount} 份对话`, "success");
              renderChatFiles();
              renderCards();
            } else {
              toast("未导入任何对话（文件格式不支持）", "error");
            }
          }
        };
        reader.readAsText(file);
      }
      if (pending === 0) toast("请拖入 JSON 文件", "error");
    });
  }

  // ============ 初始化 ============
  initTheme();
  loadCustomStudentsIntoChars();
  renderProviders();
  renderCards();
  loadConfig();
  initApiStatus();
  setupDragDrop();

  // 预加载所有角色立绘，避免聊天中每次创建 img 时解码闪烁
  const _preload = {};
  CHARACTERS.forEach(c => {
    const img = new Image();
    img.src = c.image;
    _preload[c.id] = img;
  });
  // 用一个隐藏 DOM 缓存，确保浏览器把它画进合成层
  const _preloadHolder = document.createElement("div");
  _preloadHolder.style.cssText = "position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none";
  CHARACTERS.forEach(c => {
    const im = document.createElement("img");
    im.src = c.image; im.decoding = "async"; im.loading = "eager";
    _preloadHolder.appendChild(im);
  });
  document.body.appendChild(_preloadHolder);

  // 移动端键盘弹出时滚动到底部，不修改 height（dvh 已自适应）
  function setupViewportHandler() {
    if (!window.visualViewport) return;
    let scrollTimer = null;
    const handler = () => {
      const overlay = document.getElementById("chatOverlay");
      if (!overlay || !overlay.classList.contains("open")) return;
      // 节流：避免连续触发造成渲染抖动
      if (scrollTimer) clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => scrollChatToBottom(), 100);
    };
    window.visualViewport.addEventListener("resize", handler);
  }
  setupViewportHandler();

  // ESC 关闭聊天 / 面板 / 弹窗
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (document.getElementById("nameModal").classList.contains("open")) { closeNameModal(); return; }
    if (document.getElementById("customRoleModal").classList.contains("open")) { closeCustomRoleModal(); return; }
    if (document.getElementById("chatFilesModal").classList.contains("open")) { closeChatFiles(); return; }
    if (document.getElementById("chatOverlay").classList.contains("open")) { closeChat(); return; }
    if (document.getElementById("apiPanel").classList.contains("open")) { toggleApiPanel(); return; }
  });
</script>
